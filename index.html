<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MXGP Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-active { color: #ea580c; border-top: 3px solid #ea580c; background: rgba(255,255,255,0.05); }
        body { background-color: #f3f4f6; padding-bottom: 80px; }
    </style>
</head>
<body class="font-sans text-gray-900">

    <div id="page-standings">
        <header class="bg-black text-white p-4 sticky top-0 z-50 border-b-2 border-orange-600 text-center">
            <h1 id="main-title" class="text-lg font-black italic uppercase text-orange-600 mb-4 tracking-tighter italic">MXGP STANDINGS</h1>
            <div class="flex justify-center space-x-2">
                <button onclick="switchClass('mxgp')" id="btn-mxgp" class="px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white shadow-md">MXGP</button>
                <button onclick="switchClass('mx2')" id="btn-mx2" class="px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400">MX2</button>
            </div>
        </header>
        <div id="standings-list" class="max-w-md mx-auto p-4 space-y-3"></div>
    </div>

    <div id="page-calendar" class="hidden">
        <header class="bg-black text-white p-6 sticky top-0 z-50 border-b-2 border-orange-600 text-center">
            <h1 class="text-xl font-black italic uppercase text-orange-600 italic">CALENDAR</h1>
        </header>
        <div id="calendar-list" class="max-w-md mx-auto p-4 space-y-3"></div>
    </div>

    <div id="page-results" class="hidden">
        <header class="bg-black text-white p-6 sticky top-0 z-50 border-b-2 border-orange-600 text-center">
            <h1 class="text-xl font-black italic uppercase text-orange-600 italic">ARGENTINA RESULTS</h1>
        </header>
        <div id="results-list" class="max-w-md mx-auto p-4 space-y-3"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black text-white flex justify-around items-center z-50 h-16 border-t border-gray-900">
        <button onclick="showPage('standings')" id="nav-standings" class="flex-1 flex flex-col items-center justify-center h-full nav-active">
            <span class="text-[9px] font-black uppercase tracking-widest">Standings</span>
        </button>
        <button onclick="showPage('calendar')" id="nav-calendar" class="flex-1 flex flex-col items-center justify-center h-full text-gray-500">
            <span class="text-[9px] font-black uppercase tracking-widest">Calendar</span>
        </button>
        <button onclick="showPage('results')" id="nav-results" class="flex-1 flex flex-col items-center justify-center h-full text-gray-500">
            <span class="text-[9px] font-black uppercase tracking-widest">Argentina</span>
        </button>
    </nav>

    <script>
        let db = {};

        async function init() {
            const res = await fetch('data.json?t=' + Date.now());
            db = await res.json();
            switchClass('mxgp');
            renderCalendar();
            renderList('results-list', db.argentina_test);
        }

        function showPage(page) {
            document.getElementById('page-standings').classList.toggle('hidden', page !== 'standings');
            document.getElementById('page-calendar').classList.toggle('hidden', page !== 'calendar');
            document.getElementById('page-results').classList.toggle('hidden', page !== 'results');
            
            // Update Nav Icons
            document.getElementById('nav-standings').className = page === 'standings' ? 'flex-1 h-full nav-active font-black uppercase' : 'flex-1 h-full text-gray-500 font-black uppercase';
            document.getElementById('nav-calendar').className = page === 'calendar' ? 'flex-1 h-full nav-active font-black uppercase' : 'flex-1 h-full text-gray-500 font-black uppercase';
            document.getElementById('nav-results').className = page === 'results' ? 'flex-1 h-full nav-active font-black uppercase' : 'flex-1 h-full text-gray-500 font-black uppercase';
            window.scrollTo(0,0);
        }

        function renderList(containerId, riders) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; // Maakt de lijst leeg voor gebruik
            if (!riders) return;

            riders.forEach(r => {
                container.innerHTML += `
                <div class="flex items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <span class="text-xl font-bold w-10 text-gray-200">${r.pos}</span>
                    <div class="w-12 h-12 rounded-full bg-orange-50 flex items-center justify-center text-orange-600 font-black mr-4 text-sm">${r.num}</div>
                    <div class="flex-grow">
                        <h2 class="font-extrabold text-gray-900 leading-tight uppercase text-sm italic">${r.name}</h2>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-0.5">${r.bike}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-black">${r.pts}</span>
                        <p class="text-[10px] text-orange-600 font-black uppercase">pts</p>
                    </div>
                </div>`;
            });
        }

        function switchClass(cat) {
            document.getElementById('main-title').innerText = db[cat].title;
            document.getElementById('btn-mxgp').className = cat === 'mxgp' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white shadow-md' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            document.getElementById('btn-mx2').className = cat === 'mx2' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white shadow-md' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            renderList('standings-list', db[cat].riders);
        }

        function renderCalendar() {
            const list = document.getElementById('calendar-list');
            list.innerHTML = '';
            db.calendar.forEach(event => {
                list.innerHTML += `
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-orange-600">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-black bg-orange-100 text-orange-600 px-2 py-1 rounded uppercase">ROUND ${event.round}</span>
                        <span class="text-xs font-bold text-gray-400 uppercase">${event.date}</span>
                    </div>
                    <h2 class="text-lg font-black text-gray-900 uppercase italic leading-tight">${event.gp}</h2>
                    <p class="text-sm text-gray-500 font-bold italic mt-1 uppercase">📍 ${event.loc}</p>
                </div>`;
            });
        }

        init();
    </script>
</body>
</html>
