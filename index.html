<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MX Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-active { color: #ea580c; border-top: 3px solid #ea580c; background: rgba(255,255,255,0.05); }
        body { background-color: #f3f4f6; padding-bottom: 70px; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="font-sans text-gray-900">

    <div id="page-standings" class="page active">
        <header class="bg-black text-white p-4 sticky top-0 z-50 border-b-2 border-orange-600 text-center">
            <h1 id="main-title" class="text-lg font-black italic uppercase text-orange-600 mb-4 tracking-tighter italic">STANDINGS</h1>
            <div class="flex justify-center space-x-2">
                <button onclick="switchClass('mxgp')" id="btn-mxgp" class="px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white">MXGP</button>
                <button onclick="switchClass('mx2')" id="btn-mx2" class="px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400">MX2</button>
            </div>
        </header>
        <div id="standings-list" class="max-w-md mx-auto p-4 space-y-3"></div>
    </div>

    <div id="page-calendar" class="page">
        <header class="bg-black text-white p-6 sticky top-0 z-50 border-b-2 border-orange-600 text-center">
            <h1 class="text-xl font-black italic uppercase text-orange-600 italic">CALENDAR</h1>
        </header>
        <div id="calendar-list" class="max-w-md mx-auto p-4 space-y-3"></div>
    </div>

    <div id="page-results" class="page">
        <header class="bg-black text-white p-4 sticky top-0 z-50 border-b-2 border-orange-600 text-center">
            <div class="flex justify-between items-center mb-4">
                <button onclick="showPage('calendar')" class="text-xs font-black text-orange-600 uppercase tracking-widest px-4 py-2 bg-gray-900 rounded-lg">← BACK</button>
                <h1 id="res-title" class="text-sm font-black italic uppercase text-white truncate mx-2 italic">RESULTS</h1>
                <div class="w-16"></div> 
            </div>
            <div class="flex justify-center space-x-2">
                <button id="res-btn-mxgp" class="px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white">MXGP</button>
                <button id="res-btn-mx2" class="px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400">MX2</button>
            </div>
        </header>
        <div id="results-list" class="max-w-md mx-auto p-4 space-y-3"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black text-white flex justify-around items-center z-50 h-16 border-t border-gray-900">
        <button onclick="showPage('standings')" id="nav-standings" class="flex-1 flex flex-col items-center justify-center h-full nav-active">
            <span class="text-[10px] font-black uppercase tracking-widest">Standings</span>
        </button>
        <button onclick="showPage('calendar')" id="nav-calendar" class="flex-1 flex flex-col items-center justify-center h-full text-gray-500">
            <span class="text-[10px] font-black uppercase tracking-widest">Calendar</span>
        </button>
    </nav>

    <script>
        let db = {};
        let activeGP = null;

        async function init() {
            const res = await fetch('data.json?t=' + Date.now());
            db = await res.json();
            switchClass('mxgp');
            renderCalendar();
        }

        function showPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            document.getElementById('nav-standings').className = (p==='standings') ? 'flex-1 flex flex-col items-center justify-center h-full nav-active' : 'flex-1 flex flex-col items-center justify-center h-full text-gray-500';
            document.getElementById('nav-calendar').className = (p==='calendar'||p==='results') ? 'flex-1 flex flex-col items-center justify-center h-full nav-active' : 'flex-1 flex flex-col items-center justify-center h-full text-gray-500';
            window.scrollTo(0,0);
        }

        function renderList(target, riders) {
            const container = document.getElementById(target);
            container.innerHTML = '';
            if(!riders || riders.length === 0) return;
            riders.forEach(r => {
                container.innerHTML += `
                <div class="flex items-center bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                    <span class="text-lg font-bold w-8 text-gray-300">${r.pos}</span>
                    <div class="w-10 h-10 rounded-full bg-orange-500 text-white flex items-center justify-center font-black mr-4 text-xs">${r.num}</div>
                    <div class="flex-grow">
                        <h2 class="font-black text-gray-900 uppercase text-xs italic">${r.name}</h2>
                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">${r.bike}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-xl font-black">${r.pts}</span>
                        <p class="text-[8px] text-orange-600 font-black uppercase">pts</p>
                    </div>
                </div>`;
            });
        }

        function switchClass(cat) {
            document.getElementById('btn-mxgp').className = cat==='mxgp' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            document.getElementById('btn-mx2').className = cat==='mx2' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            renderList('standings-list', db[cat].riders);
        }

        function renderCalendar() {
            const list = document.getElementById('calendar-list');
            list.innerHTML = '';
            db.calendar.forEach((ev, i) => {
                const open = ev.mxgp_res.length > 0;
                list.innerHTML += `
                <div onclick="${open ? `openRes(${i})` : ''}" class="bg-white p-4 rounded-xl shadow-sm border-l-4 ${open ? 'border-orange-600' : 'border-gray-200'}">
                    <div class="flex justify-between text-[9px] font-black uppercase text-gray-400 mb-1">
                        <span>ROUND ${ev.round}</span>
                        <span>${ev.date}</span>
                    </div>
                    <h2 class="text-md font-black uppercase italic">${ev.gp}</h2>
                    <p class="text-xs text-gray-400 font-bold uppercase tracking-tighter">${ev.loc}</p>
                </div>`;
            });
        }

        function openRes(i) {
            activeGP = db.calendar[i];
            document.getElementById('res-title').innerText = activeGP.gp;
            switchRes('mxgp');
            showPage('results');
        }

        function switchRes(cat) {
            document.getElementById('res-btn-mxgp').className = cat==='mxgp' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            document.getElementById('res-btn-mx2').className = cat==='mx2' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            document.getElementById('res-btn-mxgp').onclick = () => switchRes('mxgp');
            document.getElementById('res-btn-mx2').onclick = () => switchRes('mx2');
            renderList('results-list', activeGP[cat+'_res']);
        }

        init();
    </script>
</body>
</html>
