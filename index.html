<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MX Pro App V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-active { color: #ea580c; border-top: 3px solid #ea580c; background: rgba(255,255,255,0.05); }
        body { -webkit-tap-highlight-color: transparent; padding-bottom: 70px; background-color: #f3f4f6; }
        .modal-open { overflow: hidden; }
    </style>
</head>
<body class="font-sans text-gray-900">

    <div id="page-standings">
        <header class="bg-black text-white p-4 sticky top-0 z-50 border-b-2 border-orange-600 shadow-lg">
            <h1 id="main-title" class="text-lg font-black italic uppercase text-orange-600 tracking-tighter text-center mb-4">LOADING...</h1>
            <div class="flex justify-center space-x-2">
                <button onclick="switchClass('mxgp')" id="btn-mxgp" class="px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white border-0 transition-all shadow-md uppercase">MXGP</button>
                <button onclick="switchClass('mx2')" id="btn-mx2" class="px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400 border-0 transition-all shadow-md uppercase">MX2</button>
            </div>
        </header>
        <div id="standings-list" class="max-w-md mx-auto p-4 space-y-3"></div>
    </div>

    <div id="page-calendar" class="hidden">
        <header class="bg-black text-white p-6 sticky top-0 z-50 border-b-2 border-orange-600 text-center shadow-lg">
            <h1 class="text-xl font-black italic uppercase text-orange-600 tracking-widest">MXGP CALENDAR</h1>
        </header>
        <div id="calendar-list" class="max-w-md mx-auto p-4 space-y-3"></div>
    </div>

    <div id="results-modal" class="fixed inset-0 bg-black bg-opacity-90 z-[100] hidden overflow-y-auto">
        <div class="p-4">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modal-title" class="text-white font-black italic text-xl uppercase tracking-tighter">RACE RESULTS</h2>
                <button onclick="closeModal()" class="text-white text-4xl font-light">&times;</button>
            </div>
            <div class="flex justify-center space-x-2 mb-6">
                <button id="modal-btn-mxgp" class="px-6 py-2 rounded-full font-black text-xs bg-orange-600 text-white">MXGP</button>
                <button id="modal-btn-mx2" class="px-6 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400">MX2</button>
            </div>
            <div id="modal-results-list" class="space-y-2"></div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black text-white flex justify-around items-center z-50 h-16 border-t border-gray-900 shadow-2xl">
        <button onclick="showPage('standings')" id="nav-standings" class="flex-1 flex flex-col items-center justify-center h-full nav-active bg-transparent border-0">
            <span class="text-[10px] font-black uppercase tracking-widest">Standings</span>
        </button>
        <button onclick="showPage('calendar')" id="nav-calendar" class="flex-1 flex flex-col items-center justify-center h-full text-gray-500 bg-transparent border-0">
            <span class="text-[10px] font-black uppercase tracking-widest">Calendar</span>
        </button>
    </nav>

    <script>
        let currentData = {};
        let activeModalRace = null;

        async function init() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                currentData = await res.json();
                switchClass('mxgp');
                renderCalendar();
            } catch (e) { console.error(e); }
        }

        function showPage(page) {
            document.getElementById('page-standings').classList.toggle('hidden', page !== 'standings');
            document.getElementById('page-calendar').classList.toggle('hidden', page !== 'calendar');
            document.getElementById('nav-standings').classList.toggle('nav-active', page === 'standings');
            document.getElementById('nav-calendar').classList.toggle('nav-active', page === 'calendar');
            window.scrollTo(0,0);
        }

        function switchClass(className) {
            const list = document.getElementById('standings-list');
            const classData = currentData[className];
            if (!classData) return;
            document.getElementById('main-title').innerText = classData.title;
            list.innerHTML = '';
            document.getElementById('btn-mxgp').className = className === 'mxgp' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white shadow-md' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            document.getElementById('btn-mx2').className = className === 'mx2' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white shadow-md' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';

            classData.riders.forEach(r => {
                list.innerHTML += `<div class="flex items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100"><span class="text-xl font-bold w-10 text-gray-200">${r.pos}</span><div class="w-12 h-12 rounded-full bg-orange-50 flex items-center justify-center text-orange-600 font-black mr-4 text-sm">${r.number}</div><div class="flex-grow"><h2 class="font-extrabold text-gray-900 leading-tight uppercase text-sm">${r.name}</h2><p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-0.5">${r.bike}</p></div><div class="text-right"><span class="text-2xl font-black">${r.points}</span><p class="text-[10px] text-orange-600 font-black uppercase">pts</p></div></div>`;
            });
        }

        function renderCalendar() {
            const list = document.getElementById('calendar-list');
            list.innerHTML = '';
            currentData.calendar.forEach((event, index) => {
                const hasResults = event.mxgp_results && event.mxgp_results.length > 0;
                list.innerHTML += `
                <div onclick="${hasResults ? `openModal(${index})` : ''}" class="bg-white p-5 rounded-2xl shadow-sm border-l-4 ${hasResults ? 'border-orange-600 active:scale-95 transition-transform cursor-pointer' : 'border-gray-300'} text-left">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-black bg-orange-100 text-orange-600 px-2 py-1 rounded uppercase">ROUND ${event.round}</span>
                        <span class="text-xs font-bold text-gray-400 uppercase">${event.date}</span>
                    </div>
                    <h2 class="text-lg font-black text-gray-900 uppercase italic leading-tight ${hasResults ? 'underline decoration-orange-600 decoration-2 underline-offset-4' : ''}">${event.gp}</h2>
                    <p class="text-sm text-gray-500 font-bold italic mt-1 uppercase">📍 ${event.loc}</p>
                    ${hasResults ? '<p class="text-[10px] text-orange-600 font-black mt-2 uppercase tracking-tighter">Tap for results →</p>' : ''}
                </div>`;
            });
        }

        function openModal(index) {
            activeModalRace = currentData.calendar[index];
            document.getElementById('modal-title').innerText = activeModalRace.gp;
            renderModalResults('mxgp');
            document.getElementById('results-modal').classList.remove('hidden');
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            document.getElementById('results-modal').classList.add('hidden');
            document.body.classList.remove('modal-open');
        }

        function renderModalResults(className) {
            const list = document.getElementById('modal-results-list');
            const results = className === 'mxgp' ? activeModalRace.mxgp_results : activeModalRace.mx2_results;
            list.innerHTML = '';

            document.getElementById('modal-btn-mxgp').className = className === 'mxgp' ? 'px-6 py-2 rounded-full font-black text-xs bg-orange-600 text-white' : 'px-6 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            document.getElementById('modal-btn-mx2').className = className === 'mx2' ? 'px-6 py-2 rounded-full font-black text-xs bg-orange-600 text-white' : 'px-6 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            
            document.getElementById('modal-btn-mxgp').onclick = () => renderModalResults('mxgp');
            document.getElementById('modal-btn-mx2').onclick = () => renderModalResults('mx2');

            results.forEach(r => {
                list.innerHTML += `<div class="flex items-center bg-gray-900 p-3 rounded-xl border border-gray-800"><span class="text-lg font-bold w-8 text-gray-600">${r.pos}</span><div class="w-10 h-10 rounded-full bg-orange-600 flex items-center justify-center text-white font-black mr-3 text-xs">${r.number}</div><div class="flex-grow"><h2 class="font-bold text-white uppercase text-xs">${r.name}</h2><p class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">${r.bike}</p></div><div class="text-right text-white font-black text-lg">${r.points}</div></div>`;
            });
        }

        init();
    </script>
</body>
</html>
