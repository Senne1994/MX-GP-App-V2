<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MXGP Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-active { color: #ea580c; border-top: 3px solid #ea580c; background: rgba(255,255,255,0.05); }
        body { background-color: #f3f4f6; padding-bottom: 70px; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body class="font-sans text-gray-900">

    <div id="page-standings" class="page active">
        <header class="bg-black text-white p-4 sticky top-0 z-50 border-b-2 border-orange-600 text-center">
            <h1 id="main-title" class="text-lg font-black italic uppercase text-orange-600 mb-4 tracking-tighter italic">STANDINGS</h1>
            <div class="flex justify-center space-x-2">
                <button onclick="switchClass('mxgp')" id="btn-mxgp" class="px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white">MXGP</button>
                <button onclick="switchClass('mx2')" id="btn-mx2" class="px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400">MX2</button>
            </div>
        </header>
        <div id="standings-list" class="max-w-md mx-auto p-4 space-y-3"></div>
    </div>

    <div id="page-calendar" class="page">
        <header class="bg-black text-white p-6 sticky top-0 z-50 border-b-2 border-orange-600 text-center">
            <h1 class="text-xl font-black italic uppercase text-orange-600 italic">CALENDAR</h1>
        </header>
        <div id="calendar-list" class="max-w-md mx-auto p-4 space-y-3"></div>
    </div>

    <div id="page-results" class="page">
        <header class="bg-black text-white p-4 sticky top-0 z-50 border-b-2 border-orange-600 text-center">
            <div class="flex justify-between items-center mb-4">
                <button onclick="showPage('calendar')" class="text-xs font-bold text-gray-400 uppercase">← Back</button>
                <h1 id="res-title" class="text-lg font-black italic uppercase text-orange-600 italic truncate mx-4">RESULTS</h1>
                <div class="w-10"></div>
            </div>
            <div class="flex justify-center space-x-2">
                <button id="res-btn-mxgp" class="px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white">MXGP</button>
                <button id="res-btn-mx2" class="px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400">MX2</button>
            </div>
        </header>
        <div id="results-list" class="max-w-md mx-auto p-4 space-y-3"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black text-white flex justify-around items-center z-50 h-16 border-t border-gray-900 shadow-2xl">
        <button onclick="showPage('standings')" id="nav-standings" class="flex-1 flex flex-col items-center justify-center h-full nav-active">
            <span class="text-[10px] font-black uppercase tracking-widest">Standings</span>
        </button>
        <button onclick="showPage('calendar')" id="nav-calendar" class="flex-1 flex flex-col items-center justify-center h-full text-gray-500">
            <span class="text-[10px] font-black uppercase tracking-widest">Calendar</span>
        </button>
    </nav>

    <script>
        let db = {};
        let activeGP = null;

        async function init() {
            const res = await fetch('data.json?t=' + Date.now());
            db = await res.json();
            switchClass('mxgp');
            renderCalendar();
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            
            document.getElementById('nav-standings').classList.toggle('nav-active', pageId === 'standings');
            document.getElementById('nav-calendar').classList.toggle('nav-active', pageId === 'calendar' || pageId === 'results');
            document.getElementById('nav-standings').classList.toggle('text-gray-500', pageId !== 'standings');
            document.getElementById('nav-calendar').classList.toggle('text-gray-500', pageId !== 'calendar' && pageId !== 'results');
            window.scrollTo(0,0);
        }

        function renderRiderList(containerId, riders) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if (!riders || riders.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 font-bold p-12 uppercase text-xs">No data available</p>';
                return;
            }
            riders.forEach(r => {
                container.innerHTML += `
                <div class="flex items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <span class="text-xl font-bold w-10 text-gray-200">${r.pos}</span>
                    <div class="w-12 h-12 rounded-full bg-orange-50 flex items-center justify-center text-orange-600 font-black mr-4 text-sm">${r.num}</div>
                    <div class="flex-grow">
                        <h2 class="font-extrabold text-gray-900 leading-tight uppercase text-sm italic">${r.name}</h2>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-0.5">${r.bike}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-black">${r.pts}</span>
                        <p class="text-[10px] text-orange-600 font-black uppercase">pts</p>
                    </div>
                </div>`;
            });
        }

        function switchClass(cat) {
            document.getElementById('main-title').innerText = db[cat].title;
            document.getElementById('btn-mxgp').className = cat === 'mxgp' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white shadow-md' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            document.getElementById('btn-mx2').className = cat === 'mx2' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white shadow-md' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            renderRiderList('standings-list', db[cat].riders);
        }

        function renderCalendar() {
            const list = document.getElementById('calendar-list');
            list.innerHTML = '';
            db.calendar.forEach((event, idx) => {
                const hasRes = event.mxgp_res.length > 0;
                list.innerHTML += `
                <div onclick="${hasRes ? `openResults(${idx})` : ''}" class="bg-white p-5 rounded-2xl shadow-sm border-l-4 ${hasRes ? 'border-orange-600' : 'border-gray-200'}">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-black bg-orange-100 text-orange-600 px-2 py-1 rounded uppercase">ROUND ${event.round}</span>
                        <span class="text-xs font-bold text-gray-400 uppercase">${event.date}</span>
                    </div>
                    <h2 class="text-lg font-black text-gray-900 uppercase italic leading-tight">${event.gp}</h2>
                    <p class="text-sm text-gray-500 font-bold italic mt-1 uppercase">📍 ${event.loc}</p>
                    ${hasRes ? '<p class="text-[10px] text-orange-600 font-black mt-2 uppercase tracking-tighter">View Results →</p>' : ''}
                </div>`;
            });
        }

        function openResults(idx) {
            activeGP = db.calendar[idx];
            document.getElementById('res-title').innerText = activeGP.gp;
            switchResClass('mxgp');
            showPage('results');
        }

        function switchResClass(cat) {
            document.getElementById('res-btn-mxgp').className = cat === 'mxgp' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            document.getElementById('res-btn-mx2').className = cat === 'mx2' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            
            document.getElementById('res-btn-mxgp').onclick = () => switchResClass('mxgp');
            document.getElementById('res-btn-mx2').onclick = () => switchResClass('mx2');

            renderRiderList('results-list', activeGP[cat + '_res']);
        }

        init();
    </script>
</body>
</html>
