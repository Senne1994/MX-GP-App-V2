<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MX Pro App V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-active { color: #ea580c; border-top: 3px solid #ea580c; background: rgba(255,255,255,0.05); }
        body { -webkit-tap-highlight-color: transparent; padding-bottom: 70px; background-color: #f3f4f6; }
    </style>
</head>
<body class="font-sans text-gray-900">

    <div id="page-standings">
        <header class="bg-black text-white p-4 sticky top-0 z-50 border-b-2 border-orange-600 shadow-lg">
            <div class="flex justify-center items-center mb-4">
                <h1 id="main-title" class="text-lg font-black italic uppercase text-orange-600 tracking-tighter text-center tracking-widest">LOADING...</h1>
            </div>
            <div class="flex justify-center space-x-2">
                <button onclick="switchClass('mxgp')" id="btn-mxgp" class="px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white border-0 transition-all shadow-md">MXGP</button>
                <button onclick="switchClass('mx2')" id="btn-mx2" class="px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400 border-0 transition-all shadow-md">MX2</button>
            </div>
        </header>
        <div id="standings-list" class="max-w-md mx-auto p-4 space-y-3"></div>
    </div>

    <div id="page-calendar" class="hidden">
        <header class="bg-black text-white p-6 sticky top-0 z-50 border-b-2 border-orange-600 text-center shadow-lg">
            <h1 class="text-xl font-black italic uppercase text-orange-600 tracking-widest">MXGP CALENDAR</h1>
        </header>
        <div id="calendar-list" class="max-w-md mx-auto p-4 space-y-3">
            </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black text-white flex justify-around items-center z-50 h-16 border-t border-gray-900 shadow-2xl">
        <button onclick="showPage('standings')" id="nav-standings" class="flex-1 flex flex-col items-center justify-center h-full nav-active bg-transparent border-0">
            <span class="text-[10px] font-black uppercase tracking-widest">Standings</span>
        </button>
        <button onclick="showPage('calendar')" id="nav-calendar" class="flex-1 flex flex-col items-center justify-center h-full text-gray-500 bg-transparent border-0">
            <span class="text-[10px] font-black uppercase tracking-widest">Calendar</span>
        </button>
    </nav>

    <script>
        let currentData = {};

        async function init() {
            try {
                const res = await fetch('data.json?t=' + Date.now());
                currentData = await res.json();
                switchClass('mxgp');
                renderCalendar();
            } catch (e) {
                console.error("Error loading data:", e);
            }
        }

        function showPage(page) {
            document.getElementById('page-standings').classList.toggle('hidden', page !== 'standings');
            document.getElementById('page-calendar').classList.toggle('hidden', page !== 'calendar');
            document.getElementById('nav-standings').classList.toggle('nav-active', page === 'standings');
            document.getElementById('nav-standings').classList.toggle('text-gray-500', page !== 'standings');
            document.getElementById('nav-calendar').classList.toggle('nav-active', page === 'calendar');
            document.getElementById('nav-calendar').classList.toggle('text-gray-500', page !== 'calendar');
            window.scrollTo(0,0);
        }

        function switchClass(className) {
            const list = document.getElementById('standings-list');
            const classData = currentData[className];
            if (!classData) return;

            document.getElementById('main-title').innerText = classData.title;
            list.innerHTML = '';
            
            document.getElementById('btn-mxgp').className = className === 'mxgp' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white shadow-md' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            document.getElementById('btn-mx2').className = className === 'mx2' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white shadow-md' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';

            classData.riders.forEach(r => {
                list.innerHTML += `
                <div class="flex items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
                    <span class="text-xl font-bold w-10 text-gray-200">${r.pos}</span>
                    <div class="w-12 h-12 rounded-full bg-orange-50 flex items-center justify-center text-orange-600 font-black mr-4 text-sm">
                        ${r.number}
                    </div>
                    <div class="flex-grow">
                        <h2 class="font-extrabold text-gray-900 leading-tight uppercase text-sm">${r.name}</h2>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-0.5">${r.bike}</p>
                    </div>
                    <div class="text-right">
                        <span class="text-2xl font-black tabular-nums">${r.points}</span>
                        <p class="text-[10px] text-orange-600 font-black uppercase">pts</p>
                    </div>
                </div>`;
            });
        }

        function renderCalendar() {
            const list = document.getElementById('calendar-list');
            const calendar = currentData.calendar;
            list.innerHTML = '';
            
            if(!calendar || calendar.length === 0) {
                list.innerHTML = "<p class='text-center p-10 text-gray-400 font-bold uppercase'>Calendar empty...</p>";
                return;
            }

            calendar.forEach(event => {
                list.innerHTML += `
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-orange-600 text-left">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-black bg-orange-100 text-orange-600 px-2 py-1 rounded uppercase">ROUND ${event.round}</span>
                        <span class="text-xs font-bold text-gray-400 uppercase">${event.date}</span>
                    </div>
                    <h2 class="text-lg font-black text-gray-900 uppercase italic leading-tight">${event.gp}</h2>
                    <p class="text-sm text-gray-500 font-bold italic mt-1 uppercase">📍 ${event.loc}</p>
                </div>`;
            });
        }

        init();
    </script>
</body>
</html>
