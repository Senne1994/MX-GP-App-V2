<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MX Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .nav-active { color: #ea580c; border-top: 3px solid #ea580c; background: rgba(255,255,255,0.05); }
        body { background-color: #f3f4f6; padding-bottom: 70px; -webkit-tap-highlight-color: transparent; }
        .page { display: none; }
        .page.active { display: block; }
        /* Forceer dichte achtergrond voor modal */
        #results-modal { background-color: #fff; }
    </style>
</head>
<body class="font-sans text-gray-900">

    <div id="page-standings" class="page active">
        <header class="bg-black text-white p-4 sticky top-0 z-50 border-b-2 border-orange-600 text-center shadow-lg">
            <h1 id="main-title" class="text-lg font-black italic uppercase text-orange-600 mb-4 tracking-tighter">LOADING...</h1>
            <div class="flex justify-center space-x-2">
                <button onclick="switchClass('mxgp')" id="btn-mxgp" class="px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white">MXGP</button>
                <button onclick="switchClass('mx2')" id="btn-mx2" class="px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400">MX2</button>
            </div>
        </header>
        <div id="standings-list" class="max-w-md mx-auto p-4 space-y-3"></div>
    </div>

    <div id="page-calendar" class="page">
        <header class="bg-black text-white p-6 sticky top-0 z-50 border-b-2 border-orange-600 text-center shadow-lg">
            <h1 class="text-xl font-black italic uppercase text-orange-600 italic">CALENDAR</h1>
        </header>
        <div id="calendar-list" class="max-w-md mx-auto p-4 space-y-3"></div>
    </div>

    <div id="results-modal" class="fixed inset-0 z-[100] hidden flex flex-col modal-bg">
        <header class="bg-black text-white p-4 border-b-2 border-orange-600 shadow-xl">
            <div class="flex justify-between items-center mb-4 px-2">
                <h2 id="modal-title" class="text-lg font-black italic uppercase text-orange-600 truncate italic">RESULTS</h2>
                <button onclick="closeModal()" class="bg-gray-800 text-white w-10 h-10 rounded-full font-bold flex items-center justify-center">✕</button>
            </div>
            <div class="flex justify-center space-x-2">
                <button id="modal-btn-mxgp" class="px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white shadow-md">MXGP</button>
                <button id="modal-btn-mx2" class="px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400 shadow-none">MX2</button>
            </div>
        </header>
        <div id="modal-results-list" class="flex-1 overflow-y-auto p-4 space-y-3 bg-white"></div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black text-white flex justify-around items-center z-50 h-16 border-t border-gray-900 shadow-2xl">
        <button onclick="showPage('standings')" id="nav-standings" class="flex-1 flex flex-col items-center justify-center h-full nav-active">
            <span class="text-[10px] font-black uppercase tracking-widest">Standings</span>
        </button>
        <button onclick="showPage('calendar')" id="nav-calendar" class="flex-1 flex flex-col items-center justify-center h-full text-gray-500">
            <span class="text-[10px] font-black uppercase tracking-widest">Calendar</span>
        </button>
    </nav>

    <script>
        let currentData = {};
        let activeGP = null;

        async function init() {
            const res = await fetch('data.json?t=' + Date.now());
            currentData = await res.json();
            switchClass('mxgp');
            renderCalendar();
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            
            document.getElementById('nav-standings').classList.toggle('nav-active', pageId === 'standings');
            document.getElementById('nav-calendar').classList.toggle('nav-active', pageId === 'calendar');
            document.getElementById('nav-standings').classList.toggle('text-gray-500', pageId !== 'standings');
            document.getElementById('nav-calendar').classList.toggle('text-gray-500', pageId !== 'calendar');
            window.scrollTo(0,0);
        }

        // UNIVERSELE FUNCTION: We gebruiken hier INLINE CSS voor Flexbox om overlapping te voorkomen!
        function renderRiderList(containerId, riders) {
            const container = document.getElementById(containerId);
            container.innerHTML = ''; 
            if (!riders || riders.length === 0) {
                container.innerHTML = '<p class="text-center text-gray-400 font-bold p-12 uppercase text-xs">No data available</p>';
                return;
            }
            riders.forEach(r => {
                container.innerHTML += `
                <div style="display: flex; align-items: center; background-color: white; padding: 16px; border-radius: 16px; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); border: 1px solid #f1f5f9;">
                    <span style="font-size: 20px; font-weight: 700; width: 40px; color: #e2e8f0;">${r.pos}</span>
                    <div style="width: 48px; height: 48px; border-radius: 9999px; background-color: #fff7ed; color: #ea580c; display: flex; align-items: center; justify-content: center; font-weight: 900; margin-right: 16px; font-size: 14px;">${r.number}</div>
                    <div style="flex-grow: 1;">
                        <h2 style="font-weight: 800; color: #111827; line-height: 1.25; text-transform: uppercase; font-size: 14px; font-style: italic;">${r.name}</h2>
                        <p style="font-size: 10px; color: #9ca3af; font-weight: 700; text-transform: uppercase; tracking: widests; margin-top: 2px;">${r.bike}</p>
                    </div>
                    <div style="text-align: right;">
                        <span style="font-size: 24px; font-weight: 900; color: #111827; font-feature-settings: 'tnum';">${r.points}</span>
                        <p style="font-size: 10px; color: #ea580c; font-weight: 900; text-transform: uppercase;">pts</p>
                    </div>
                </div>`;
            });
        }

        function switchClass(className) {
            const data = currentData[className];
            document.getElementById('main-title').innerText = data.title;
            document.getElementById('btn-mxgp').className = className === 'mxgp' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white shadow-md' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            document.getElementById('btn-mx2').className = className === 'mx2' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white shadow-md' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            renderRiderList('standings-list', data.riders);
        }

        function renderCalendar() {
            const list = document.getElementById('calendar-list');
            list.innerHTML = '';
            currentData.calendar.forEach((event, index) => {
                const hasResults = event.mxgp_res.length > 0;
                list.innerHTML += `
                <div onclick="${hasResults ? `openModal(${index})` : ''}" class="bg-white p-5 rounded-2xl shadow-sm border-l-4 ${hasResults ? 'border-orange-600' : 'border-gray-200'} active:scale-95 transition-transform cursor-pointer">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-black bg-orange-100 text-orange-600 px-2 py-1 rounded uppercase tracking-wider">ROUND ${event.round}</span>
                        <span class="text-xs font-bold text-gray-400 uppercase">${event.date}</span>
                    </div>
                    <h2 class="text-lg font-black text-gray-900 uppercase italic leading-tight ${hasResults ? 'underline decoration-orange-500 underline-offset-4' : ''}">${event.gp}</h2>
                    <p class="text-sm text-gray-500 font-bold italic mt-1 uppercase">📍 ${event.loc}</p>
                    ${hasResults ? '<p class="text-[10px] text-orange-600 font-black mt-2 uppercase tracking-tighter">View Results →</p>' : ''}
                </div>`;
            });
        }

        function openModal(index) {
            activeGP = currentData.calendar[index];
            document.getElementById('modal-title').innerText = activeGP.gp;
            updateModalView('mxgp');
            document.getElementById('results-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('results-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function updateModalView(className) {
            document.getElementById('modal-btn-mxgp').className = className === 'mxgp' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white shadow-md' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400';
            document.getElementById('modal-btn-mx2').className = className === 'mx2' ? 'px-8 py-2 rounded-full font-black text-xs bg-orange-600 text-white shadow-md' : 'px-8 py-2 rounded-full font-black text-xs bg-gray-800 text-gray-400 shadow-none';
            
            document.getElementById('modal-btn-mxgp').onclick = () => updateModalView('mxgp');
            document.getElementById('modal-btn-mx2').onclick = () => updateModalView('mx2');

            renderRiderList('modal-results-list', className === 'mxgp' ? activeGP.mxgp_res : activeGP.mx2_res);
        }

        init();
    </script>
</body>
</html>
